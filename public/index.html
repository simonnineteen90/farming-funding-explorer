<!DOCTYPE html>
<html lang="en" class="govuk-template">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Find farming funding – GOV.UK</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/govuk-frontend@5.8.0/dist/govuk/govuk-frontend.min.css">
</head>
<body class="govuk-template__body">
  <script>document.body.className += ' js-enabled';</script>

  <!-- GOV.UK Header -->
  <header class="govuk-header" data-module="govuk-header">
    <div class="govuk-header__container govuk-width-container">
      <div class="govuk-header__logo">
        <a href="/" class="govuk-header__link govuk-header__link--homepage">
          <span class="govuk-header__logotype-text">GOV.UK</span>
        </a>
      </div>
    </div>
  </header>

  <div class="govuk-width-container">
    <main class="govuk-main-wrapper" id="main-content">

      <h1 class="govuk-heading-xl">Find funding for your farm</h1>
      <p class="govuk-body">Describe what you need funding for and we'll show you relevant schemes.</p>

      <!-- Search form -->
      <form id="search-form" class="govuk-!-margin-bottom-8">
        <div class="govuk-form-group">
          <label class="govuk-label govuk-label--m" for="search-input">
            What do you need funding for?
          </label>
          <div id="search-hint" class="govuk-hint">
            For example, "planting hedgerows" or "improving soil health"
          </div>
          <input
            class="govuk-input"
            id="search-input"
            name="input"
            type="text"
            aria-describedby="search-hint"
          >
        </div>
        <button type="submit" class="govuk-button" data-module="govuk-button">
          Search
        </button>
      </form>

      <!-- Results container -->
      <div id="results"></div>

    </main>
  </div>

  <!-- GOV.UK Footer -->
  <footer class="govuk-footer">
    <div class="govuk-width-container">
      <div class="govuk-footer__meta">
        <div class="govuk-footer__meta-item govuk-footer__meta-item--grow">
          <span class="govuk-footer__licence-description">
            Built for a hackathon prototype.
          </span>
        </div>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
